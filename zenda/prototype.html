<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZENDA - Create Invoice</title>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: #F8FAFC; min-height: 100vh; padding: 20px; }
    .container { max-width: 480px; margin: 0 auto; }
    
    .header { text-align: center; margin-bottom: 40px; }
    .logo { font-size: 2.5rem; font-weight: 800; letter-spacing: -2px; color: #4F46E5; }
    .tagline { color: #64748B; font-size: 0.9rem; margin-top: 8px; }
    
    .card { background: white; border-radius: 24px; padding: 32px 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    
    .title { font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; color: #1E293B; }
    
    .field { margin-bottom: 20px; }
    .label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #64748B; margin-botton: 8px; display: block; }
    .input { width: 100%; padding: 16px; border: 2px solid #E2E8F0; border-radius: 12px; font-size: 1rem; transition: border-color 0.2s; background: #F8FAFC; }
    .input:focus { outline: none; border-color: #4F46E5; background: white; }
    
    .btn { width: 100%; padding: 18px; background: #1E293B; color: white; border: none; border-radius: 14px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn:hover { background: #4F46E5; transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
    
    .result { display: none; margin-top: 24px; padding: 20px; background: #ECFDF5; border-radius: 14px; border: 2px solid #10B981; }
    .result.show { display: block; }
    .result-label { font-size: 0.75rem; color: #059669; font-weight: 600; margin-bottom: 8px; }
    .result-link { background: white; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 0.85rem; word-break: break-all; color: #1E293B; }
    .copy-btn { margin-top: 12px; width: 100%; padding: 12px; background: #10B981; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    
    .footer { text-align: center; margin-top: 40px; color: #94A3B8; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">ZENDA</div>
      <div class="tagline">Sell faster on social</div>
    </div>
    
    <div class="card">
      <div class="title">NEW INVOICE</div>
      
      <div class="field">
        <label class="label">Who's buying?</label>
        <input type="text" class="input" id="customerName" placeholder="Customer name">
      </div>
      
      <div class="field">
        <label class="label">What are they buying?</label>
        <input type="text" class="input" id="itemName" placeholder="e.g. Bone Straight Hair - 14 inch">
      </div>
      
      <div class="field">
        <label class="label">Price (₦)</label>
        <input type="number" class="input" id="amount" placeholder="0.00">
      </div>
      
      <button class="btn" onclick="generateLink()">
        GENERATE ZENDA LINK
        <span>→</span>
      </button>
      
      <div class="result" id="result">
        <div class="result-label">📋 COPY THIS LINK AND SEND TO CUSTOMER</div>
        <div class="result-link" id="linkOutput"></div>
        <button class="copy-btn" onclick="copyLink()">COPY LINK</button>
      </div>
    </div>
    
    <div class="footer">
      Powered by ZENDA • Trusted by 1000+ vendors
    </div>
  </div>

  <script>
    const PAYSTACK_PUBLIC_KEY = 'pk_test_770b480653afc04bb6062d25ae0de0df736614ae';
    
    function generateLink() {
      const customer = document.getElementById('customerName').value;
      const item = document.getElementById('itemName').value;
      const amount = document.getElementById('amount').value;
      
      if (!customer || !item || !amount) {
        alert('Please fill in all fields');
        return;
      }
      
      // Generate unique invoice ID
      const invoiceId = 'INV-' + Date.now().toString(36).toUpperCase();
      
      // Store in localStorage (mock database)
      const invoice = {
        id: invoiceId,
        customer,
        item,
        amount: parseInt(amount),
        vendor: 'Johnson\'s Test Store',
        status: 'pending',
        created: new Date().toISOString()
      };
      
      localStorage.setItem('zenda_invoice_' + invoiceId, JSON.stringify(invoice));
      
      // Generate link - in production this would be a real URL
      const baseUrl = window.location.href.replace('prototype.html', 'customer_view.html');
      const link = `${baseUrl}?id=${invoiceId}`;
      
      document.getElementById('linkOutput').textContent = link;
      document.getElementById('result').classList.add('show');
    }
    
    function copyLink() {
      const link = document.getElementById('linkOutput').textContent;
      navigator.clipboard.writeText(link).then(() => {
        alert('Link copied! Send it to your customer.');
      });
    }
  </script>
</body>
</html>
